  <g opacity="0.95">
    <circle cx="680" cy="505" r="62" fill="none" stroke="#d5b575" stroke-width="6"/>
    <circle cx="756" cy="505" r="62" fill="none" stroke="#d5b575" stroke-width="6"/>
    <circle cx="680" cy="505" r="49" fill="none" stroke="#f0dfc4" stroke-width="2"/>

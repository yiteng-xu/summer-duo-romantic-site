    <path d="M285 777c62-128 68-262 18-403" stroke="#b8945f" stroke-width="4"/>
    <path d="M301 493c-47-34-78-82-84-133 55 12 94 45 111 94" stroke="#a95c5d" stroke-width="3"/>
    <path d="M316 596c-52-14-94-47-119-92 58-9 106 9 140 50" stroke="#bcc7b3" stroke-width="3"/>

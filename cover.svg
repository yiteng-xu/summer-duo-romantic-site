<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1080" viewBox="0 0 1440 1080" role="img" aria-labelledby="title desc">
  <title id="title">Summer Duo private invitation cover</title>
  <desc id="desc">An ivory and warm gold romantic invitation card with fine botanical line art and soft rose accents.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffaf4"/>
      <stop offset="0.55" stop-color="#fbf3ea"/>
      <stop offset="1" stop-color="#efe2d2"/>
    </linearGradient>
    <radialGradient id="blush" cx="50%" cy="50%" r="58%">
      <stop offset="0" stop-color="#f0cfc9" stop-opacity="0.78"/>
      <stop offset="1" stop-color="#f0cfc9" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="34" flood-color="#5f4635" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1440" height="1080" fill="#efe4d6"/>
  <circle cx="208" cy="194" r="256" fill="url(#blush)"/>
  <circle cx="1188" cy="876" r="332" fill="#e9d8bd" opacity="0.42"/>


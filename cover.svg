  <g text-anchor="middle" fill="#2c2520">
    <text x="720" y="392" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="22" letter-spacing="8" fill="#b8945f">A PRIVATE SUMMER INVITATION</text>
    <text x="720" y="618" font-family="Didot, 'Bodoni 72', Georgia, 'Songti SC', serif" font-size="118" letter-spacing="-5">Summer Duo</text>
    <text x="720" y="684" font-family="Georgia, 'Songti SC', serif" font-size="31" fill="#6d5d54">给下一次见面的一封邀请</text>
  </g>

  <path d="M545 744h350" stroke="#c3a16b" stroke-width="1.5"/>
  <g text-anchor="middle" fill="#8b7569" font-family="Arial, 'Microsoft YaHei', sans-serif">
